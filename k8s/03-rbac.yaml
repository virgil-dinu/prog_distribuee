apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-service-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: notification-service-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-service-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["postgres-secret"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-service-rolebinding
subjects:
- kind: ServiceAccount
  name: task-service-sa
roleRef:
  kind: Role
  name: task-service-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: notification-service-role
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: notification-service-rolebinding
subjects:
- kind: ServiceAccount
  name: notification-service-sa
roleRef:
  kind: Role
  name: notification-service-role
  apiGroup: rbac.authorization.k8s.io
